version: '3.8'
services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: sftp_loader
      POSTGRES_USER: sftp
      POSTGRES_PASSWORD: sftp
    ports:
      - "5432:5432"
  app:
    build: .
    environment:
      SFTP_DB_USER: sftp
      SFTP_DB_PASS: sftp
      SFTP_HOST: sftp.example.com
      SFTP_USER: user
      SFTP_PASS: pass
    depends_on:
      - db
    ports:
      - "8080:8080"
    volumes:
      - ./downloads:/downloads
